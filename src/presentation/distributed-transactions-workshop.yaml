  - title: "Transactions"
    slides:
      - type: "text"
        title: "Module 04: Intents And Txn Records"
        bullets:
          - "**Concepts:**"
          - "StorageReplica and TxnClient abstraction"
          - "Write Intents: placing uncommitted locks on actual records"
          - "Transaction Records: Tracking status (PENDING, COMMITTED, ABORTED)"
          - "Read-your-own-writes semantics"
          - "**Exercise:**"
          - "Resolve another transaction's intent during a read"
          - "Manage state transitions of the Transaction Record"
          - "Achieve a single-replica commit side effect"
          - "**Validation:** ./gradlew :04-intents-and-txn-records:test"
        notes: "We have storage, but how do we do multi-key transactions? We use 'Write Intents' - provisional values that point to a central 'Transaction Record'. If a read hits an intent, it checks the transaction record to see if the intent is committed. Let's build the client-side TxnClient and server-side StorageReplica."

      - type: "diagram"
        title: "Module 05: Distributed Commit"
        diagramRef: "hybrid_clock_transaction"
        bullets:
          - "**Concepts:**"
          - "Moving from single-node to a clustered environment using Tickloom"
          - "Transaction Coordinator responsibilities"
          - "Message flow between a Client and multiple Storage Replicas"
          - "Propagation of COMMIT or ABORT decisions"
          - "**Exercise:**"
          - "Observe and handle one replica acting as the coordinator"
          - "Place the transaction record safely"
          - "Execute clustered Tickloom tests"
          - "**Validation:** ./gradlew :05-distributed-commit:test"
        notes: "Here is the 'Distributed' part of Distributed Transactions. The transaction layer we built in module 04 is now stretched across multiple replicas. One replica will act as the transaction coordinator, proxying writes to others, ultimately persisting the commit record and propagating the state."

  - title: "Isolation Mechanics"
    slides:
      - type: "diagram"
        title: "Module 06: Snapshot Isolation"
        diagramRef: "snapshot_isolation_hybrid_clock_detailed"
        bullets:
          - "**Concepts:**"
          - "Assigning and maintaining read timestamps"
          - "Write-Write conflict detection"
          - "Write Skew and Update Conflicts"
          - "**Exercise:**"
          - "Extend the clustered transaction layer for snapshot isolation behavior"
          - "Pass the Tickloom tests simulating write skews"
          - "**Validation:** ./gradlew :06-snapshot-isolation:test"
        notes: "A basic commit protocol isn't enough; we need guarantees. Snapshot Isolation ensures that all reads see a consistent snapshot, and concurrent writers don't overwrite each other. We will detect write-write conflicts before they commit and observe write-skew anomalies."

      - type: "diagram"
        title: "Module 07: Clock Bound Wait"
        diagramRef: "read_restart_clock_skew"
        bullets:
          - "**Concepts:**"
          - "Clock uncertainty in distributed networks"
          - "Uncertainty Windows / Clock drift intervals"
          - "Read Restarts: When to safely step back and retry"
          - "**Exercise:**"
          - "Propagate HLC timestamps across network boundaries"
          - "Push timestamps and handle uncertainty intervals inside StorageReplica"
          - "Pass tests covering clock bounds and read restart scenarios"
          - "**Validation:** ./gradlew :07-clock-bound-wait:test"
        notes: "The final boss: True linearizability requires understanding clock uncertainty. Because nodes have different maximum clock drift, a read might see a write from the 'future' that was actually performed in the real-time 'past'. We implement Read Restarts to stall or restart transactions until the uncertainty window passes."

  - title: "Conclusion"
    slides:
      - type: "text"
        title: "Workshop Recap & Takeaways"
        bullets:
          - "Clocks (HLC) -> Storage (MVCC/RocksDB) -> Transactions (Intents)"
          - "Distributed Commit is basically an Intent + single source of truth (Txn Record)"
          - "CockroachDB/YugabyteDB push complexity down to the KV layer"
          - "We've built a robust, tested transactional coordination engine from scratch!"
        notes: "Congratulations! You've successfully traversed the entire stack of a distributed database engine. What used to be a black box of 'magic' transaction management is now 7 modules of Java code that YOU wrote. Feel free to use the 'solutions' branch as a reference architecture moving forward."
