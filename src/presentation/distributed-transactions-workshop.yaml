      - type: "text"
        title: "From Logical Versions To RocksDB Bytes"
        bullets:
          - "The logical model is easy to explain, but RocksDB does not understand MVCC directly"
          - "RocksDB stores keys and values as byte arrays and compares keys lexicographically using memcmp-style byte ordering"
          - "So we must encode the logical key and timestamp into bytes that preserve the access pattern we want"
          - "The workshop's codec turns the MVCC rule into a physical byte layout the storage engine can iterate efficiently"
        notes: "This is the bridge between the PDF page and the workshop code. Stress that the storage engine only sees bytes."

