title: "Building a Distributed Transaction System"
description: "A Teaching-First Reconstruction inspired by YugabyteDB and CockroachDB. Level: Advanced / Expert. Duration: 1 Day / 4-6 Hours. Format: Step-by-step Interactive Coding Workshop."
icon: "fas fa-laptop-code"
category: "Workshop"
sections:
  - title: "Introduction"
    slides:
      - type: "text"
        title: "Welcome to Distributed Transactions"
        bullets:
          - "Demystifying Distributed Transactions"
          - "Building core components from scratch instead of just learning APIs"
          - "Target Architecture: Shared-nothing scalable SQL databases (CockroachDB/YugabyteDB style)"
          - "7 Modules progressively layering complexity"
        notes: "Welcome everyone. The goal of this workshop is not to learn how to USE a database, but how to BUILD the fundamental transactional engine under the hood of systems like YugabyteDB and CockroachDB. We will write code for logical clocks, MVCC engines, and distributed commit protocols step-by-step."
      
      - type: "text"
        title: "Workshop Mechanics & Workflow"
        bullets:
          - "Checkpoints: 'module-XX-start' (Starter) -> 'module-XX-solution' (Reference)"
          - "Working Space: Create local branches from tags (e.g., git checkout -b participant/module-01 module-01-start)"
          - "Verifying Work: ./gradlew :XX-module:test"
          - "Compare: git diff module-XX-start module-XX-solution"
          - "Note for presenter: Remind participants to work on the 'main' branch, starting with tags module-01-start to module-07-start. Use the 'solutions' branch as the ultimate reference. Allow 20-30 minutes of hands-on coding per module, followed by a 10-15 minute conceptual review."
        notes: "To avoid getting stuck in detached HEAD states or carrying broken code forward, always start a new module by branching off its 'start' tag. The start tags for later modules already contain the completed solutions of previous modules!"

  - title: "The Primitives"
    slides:
      - type: "diagram"
        title: "Module 01: Hybrid Logical Clocks (HLC)"
        diagramRef: "hybrid_clock_basic"
        bullets:
          - "**Concepts:**"
          - "Physical time alone is prone to clock drift"
          - "Logical time (Lamport clocks) gives ordering but no relation to wall time"
          - "Hybrid Logical Clocks (HLC) combine physical and logical components"
          - "**Exercise:**"
          - "Implement HybridTimestamp ordering"
          - "Implement HybridClock.now() and HybridClock.tick(remoteTimestamp)"
          - "Pass monotonicity and causality tests"
          - "**Validation:** ./gradlew :01-hybrid-clock:test"
        notes: "In distributed systems, ordering events is hard. We cannot rely strictly on NTP/wall clocks. HLC gives us a monotonic timestamp generation mechanism that also tracks causality across nodes. This is the bedrock of our MVCC system. Let's build the time primitive."

      - type: "text"
        title: "Module 02: In-Memory MVCC (Multi-Version Concurrency Control)"
        bullets:
          - "**Concepts:**"
          - "Avoiding read-write locks by storing multiple versions of data"
          - "Version chains (key -> [v3, v2, v1])"
          - "Read at timestamp (Snapshot Reads)"
          - "Committed values vs. Provisional values"
          - "**Exercise:**"
          - "Implement exact version lookups"
          - "Traverse version chains to find the correct snapshot"
          - "**Validation:** ./gradlew :02-mvcc-core:test"
        notes: "With our clock established, we move to storage. MVCC means writers don't block readers, and readers don't block writers. You read a snapshot of the database at your provided timestamp. In this module, we build this entirely in-memory to focus strictly on semantic correctness."

      - type: "text"
        title: "Module 03: RocksDB-backed MVCC"
        bullets:
          - "**Concepts:**"
          - "Mapping MVCC concepts to an LSM tree (Log-Structured Merge-Tree)"
          - "Key encoding strategy: (UserKey, HLC Timestamp)"
          - "Descending timestamp sort order for fast recent version lookups"
          - "**Exercise:**"
          - "Implement prefix seeks and iterators"
          - "Map the in-memory visibility rules to on-disk RocksDB bytes"
          - "**Validation:** ./gradlew :03-mvcc-rocksdb:test"
        notes: "In-memory is great for learning, but real databases persist to disk. We'll swap our backend to RocksDB (an LSM KV store). The challenge here is schema design: how do we structure our keys so that sweeping a version chain is sequential and fast on disk? We append the descending timestamp to the key."

