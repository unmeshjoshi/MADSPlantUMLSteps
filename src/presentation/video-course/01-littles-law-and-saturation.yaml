title: "Little's Law and Saturation"
description: "Understanding system saturation using Little's Law"
icon: "fas fa-chart-line"
category: "Queuing Theory"

sections:
  - title: "Queues and Saturation"
    slides:
      - type: "diagram"
        title: "The Queuing Model"
        diagramRef: "01-littles-law-and-saturation"
          
      - type: "text"
        title: "The Stable System Assumption"
        bullets:
          - "For a system to be stable, the arrival rate must equal throughput"
          - "λ = X"
          - "What comes in, must go out at the same rate"
          - "If λ > X, the queue grows"

      - type: "diagram"
        title: "The Utilization Constraint"
        diagramRef: "02-utilization-constraint"

      - type: "diagram"
        title: "Network Bandwidth Saturation"
        diagramRef: "06-network-bandwidth-saturation"
      
      - type: "diagram"
        title: "Throughput vs Arrival Rate"
        diagramRef: "throughput_vs_arrival_rate_chart"
        bullets:
          - "Throughput increases linearly until saturation"
          - "Plateaus at max capacity (X_max = 1 / S)"
          - "Requests $> X_{max}$ simply pile up in the Queue"

      - type: "diagram"
        title: "Latency vs Arrival Rate"
        diagramRef: "latency_vs_arrival_rate_chart"
        bullets:
          - "Safe Zone: < 80% (Linear scaling)"
          - "Danger Zone: 80% - 95% (Non-linear queuing begins)"
          - "Saturation: > 1000 IOPS (Hockey Stick explosion!)"

      - type: "text"
        title: "Lab: Verifying Little's Law with iostat"
        bullets:
          - "Run disk load with different IOPS"
          - "Capture metrics with iostat -x 1"
          - "Verify L = λ x W using aqu-sz, r/s, w/s, and await"
          - "Calculate Service Time (S) using U = X x S"
          - "Predict the Saturation Point"

      - type: "diagram"
        title: "The Four Physical Bottlenecks"
        diagramRef: "03-four-physical-bottlenecks"
        notes: "Little's Law applies to every queued resource, not just disks CPU: cores and cycles set an upper bound on work per second Memory: capacity and bandwidth limit how fast data can move. Disk: IOPS and throughput cap reads and writes. Network: bandwidth and latency constrain messages between machines"

      - type: "text"
        title: "What to Watch in Production"
        bullets:
          - "Track throughput, latency, queue length, and utilization together"
          - "Alert on queue growth, not just when utilization reaches 100%"
          - "Watch for response time rising much faster than service time"
          - "Keep headroom: a practical target is 70% to 80% utilization"
          - "Use bottleneck-specific signals: CPU run queue, memory pressure, disk await, network drops and retransmits"

      - type: "diagram"
        title: "The Answer: Partitioning"
        diagramRef: "07-partitioning-spreads-load"
        notes: "Under heavy load, one machine becomes one hot queue. Partitioning spreads traffic and state across multiple servers. Each server handles a smaller queue and less contention. The result is higher aggregate throughput and less queuing delay."
