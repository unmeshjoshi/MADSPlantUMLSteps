title: "Deterministic Simulation Testing"
description: "A presentation on why client-visible correctness needs fault-focused testing, why nondeterminism makes failures hard to reproduce, and why an explicit tick() method is the right testing primitive."
icon: "fas fa-vial"
category: "Distributed Systems"
sections:
  - title: "Deterministic Simulation Testing"
    slides:
      - type: "text"
        title: "Deterministic Simulation Testing Sits Beside Other Test Types"
        bullets:
          - "Unit tests validate local logic"
          - "Integration tests validate interactions"
          - "Fault-focused tests validate client-visible correctness under failure"
        notes: "Open by positioning deterministic simulation testing among the other test types the audience already knows. The key idea is not to replace unit or integration tests, but to add a way to test correctness under faults and timing variation."

      - type: "image"
        title: |
          Who Am I
          - Unmesh Joshi
          - Author, Patterns Of Distributed Systems
        imagePath: "video-course/patternsbook.jpg"
        notes: "Keep this slide brief. Introduce yourself, connect your background to distributed systems, and let the book cover do most of the visual work."

      - type: "text"
        title: "A quorum read/write example"
        bullets:
          - "We will be using a quorum read/write example throughout this talk"
        notes: "Bridge into the concrete example. Tell the audience that from this point on the talk reuses one quorum scenario so they can focus on what changes between test styles rather than re-learning a new system on every slide."

      - type: "diagram"
        title: "A quick recap - What is a quorum write?"
        diagramRef: "quorum_write_recap"
        notes: ""

      - type: "diagram"
        title: "A quick recap - What is a quorum read?"
        diagramRef: "quorum_read_recap"
        notes: ""

      - type: "text"
        title: "Partial Failures Make Distributed Systems Hard"
        bullets:
          - "Failures overlap with live traffic instead of stopping the whole system at once."
        notes: "Stress that distributed systems are hard because failure is partial. Everything does not stop at once. Some parts keep running, some are slow, and clients continue sending requests throughout."

      - type: "diagram"
        title: "Chaos Engineering Tests Resilience Under Fault"
        diagramRef: "quorum_test_chaos_focus"
        bullets:
          - "The write still has to succeed and recover when one node disappears."
        notes: "Use this slide to distinguish resilience from correctness. Chaos Monkey is the narrow instance-kill version of this idea. Chaos engineering generalizes it to node loss, latency, partitions, pauses, and more."

      - type: "text"
        title: "Availability Is Not The Same As Correctness"
        bullets:
          - "A system can stay up, stay fast, and still return the wrong result."
        notes: "This is the pivot. A system can restart pods, keep serving traffic, and stay inside latency limits while still violating the semantics the client depends on."

      - type: "text"
        title: "Feature And Performance Testing Are Not Enough"
        bullets:
          - "They do not prove what clients observe during partial failure."
        notes: "Open by separating three concerns: features, performance, and correctness under failure. The key point is that a distributed system can pass feature tests and hit its SLOs while still returning the wrong value to a client."

      - type: "text"
        title: "Jepsen: A Framework For Verifying Distributed Systems Under Faults"
        bullets:
          - "Jepsen runs a live system, injects faults, records client-visible history, and checks whether that history is correct."
          - "https://github.com/jepsen-io/jepsen"
        notes: "Use this slide to define Jepsen clearly before showing the Jepsen-style quorum scenario. The important idea is that Jepsen is a framework for running fault-injected distributed system tests and validating the client-visible history."

      - type: "diagram"
        title: "Jepsen Checks Client-Visible Correctness"
        diagramRef: "quorum_test_jepsen_focus"
        bullets:
          - "The checker cares about the client-visible history, not just whether the cluster stayed alive."
        notes: "Define Jepsen in one sentence: live workload, live faults, client-visible history, checker. This slide keeps the same quorum example but shifts the question from survival to the semantics that clients actually experienced."

      - type: "text"
        title: "Why Jepsen Tests A Running System"
        bullets:
          - "Correctness is challenged while requests are in flight when partial failures happen."
        notes: "This is the reason for faulting a live system. We are not interested in whether a node can crash in the abstract. We care about what happens to real client operations while the system is under stress."

      - type: "text"
        title: "Nondeterminism Makes Failures Hard To Reproduce"
        bullets:
          - "The same fault schedule does not necessarily produce the same execution trace twice."
        notes: "This slide explains the pain after Jepsen finds something interesting. Even if you know which fault happened, rerunning the same scenario may not recreate the same internal ordering."

      - type: "diagram"
        title: "The Same Injected Faults Can Still Produce Different Executions"
        diagramRef: "deterministic_runs_vary"
        bullets:
          - "Small timing shifts can change the order that clients and nodes observe."
        notes: "Walk the audience through the two runs. The code is unchanged. The test intent is unchanged. But network readiness and disk completion move around just enough to alter the execution trace."

  - title: "Sources of Nondeterminism"
    slides:
      - type: "text"
        title: "Sources of Nondeterminism"
        bullets:
          - "1. System Clock"
          - "2. Thread Scheduling"
          - "3. Network"
          - "4. Disk"
        notes: "Use this as a quick inventory slide before diving into each source. The goal is to show that real execution is shaped by several hidden progress sources, not just one vague idea of timing."

      - type: "diagram"
        title: "Clocks And Time"
        diagramRef: "nondeterminism_clock_time"
        bullets:
          - "Timeouts, retries, and timestamps can cross different thresholds on different runs."
        notes: "Use this slide to explain that time affects behavior, not just measurement. A retry may fire before an acknowledgement in one run and after it in another."

      - type: "diagram"
        title: "Thread Scheduling"
        diagramRef: "nondeterminism_thread_scheduling"
        bullets:
          - "The same threads can be scheduled in a different order each time the program runs."
        notes: "This is the classic source of nondeterminism in concurrent code. The logic is the same, but the scheduler changes which work becomes visible first."

      - type: "diagram"
        title: "Network Timing"
        diagramRef: "nondeterminism_network_timing"
        bullets:
          - "Delays, buffering, retransmission, and delivery order change when messages are observed."
        notes: "Connect this to the quorum example. The same message can arrive early in one run and late in another, even when the injected partition or loss pattern is the same."

      - type: "diagram"
        title: "Disk Timing"
        diagramRef: "nondeterminism_disk_timing"
        bullets:
          - "Flush and completion timing change when writes appear durable to the system."
        notes: "This is easy to miss in high-level discussions. Storage timing affects when a write is considered persisted, acknowledged, or visible after recovery."

  - title: "Designing for Determinism"
    slides:
      - type: "diagram"
        title: "Hidden Progress Sources Drive Real Execution"
        diagramRef: "real_system_progress_tick"
        bullets:
          - "Real execution advances because multiple subsystems keep progressing through their own internal steps."
        notes: "Use this slide to make the core analogy. Real systems progress because multiple subsystems keep moving forward underneath the software. Those progress mechanisms are hidden and not directly controlled by the test."

      - type: "text"
        title: "We Need To Control When Components Make Progress"
        bullets:
          - "To replay an execution, we must decide when compute, network, and storage are allowed to advance."
        notes: "This is the bridge from hidden progress to deterministic design. If progress happens in the background, we cannot replay a failure precisely. The test needs control over when the important parts of the system move forward."

      - type: "text"
        title: "Four Things Must Become Controllable"
        bullets:
          - "System clock"
          - "Process execution"
          - "Network delivery"
          - "Disk persistence"
        notes: "Keep this slide simple and concrete. These are the four major sources of progression the simulator must model explicitly if we want a replayable execution trace."

      - type: "text"
        title: "We Simulate What We Cannot Control"
        bullets:
          - "Instead of real clocks, sockets, and disks, tests run against simulated time, network, and storage."
        notes: "The point here is not mocking for convenience. It is replacing uncontrolled physical components with deterministic simulated components that the test can drive explicitly."

      - type: "diagram"
        title: "Simulation Makes Progress Explicit"
        diagramRef: "simulated_components_tick"
        bullets:
          - "The test advances the process, network, and disk explicitly instead of using real components."
        notes: "Use this slide to show the control surface clearly. The process initiates work, but the test decides when the simulated network and disk progress and when their results become visible."

      - type: "diagram"
        title: "Tickloom Design"
        diagramRef: "process_messagebus_network_flow"
        notes: "Schematic of tickloom's design"

      - type: "diagram"
        title: "A Seeded Pseudorandom Generator Makes Fault Injection Replayable"
        diagramRef: "seeded_fault_injection"
        bullets:
          - "Random faults explore more scenarios."
          - "True randomness is hard to reproduce."
          - "A seed makes the fault schedule repeatable."
          - "Deterministic execution makes the scenario replayable."
        notes: "Use this slide to separate fault schedule reproduction from execution reproduction. The seed makes the injected failures replayable, and deterministic execution makes the resulting trace replayable."

      - type: "text"
        title: "A Single Thread And Event-Driven I/O Make Determinism Possible"
        bullets:
          - "One main execution thread removes scheduler nondeterminism, and event-driven I/O avoids blocking it."
        notes: "This is the architecture slide. We avoid ordinary thread scheduling by running logical progress on one main thread, and we avoid blocking that thread by making I/O event-driven."

      - type: "text"
        title: "Adopting Async and Event-Driven I/O"
        bullets:
          - "Ensure all network and storage operations (send, read, flush) are strictly non-blocking."
          - "Never use Thread.sleep(), blocking locks, or blocking Future.get() inside the core process logic."
          - "Represent I/O completions as events (using callbacks, continuations, or TickCompletableFuture)."
          - "Push real-world non-deterministic I/O (like NIO selectors or background disk writes) to the absolute edges of the architecture."
          - "Drain I/O completion events back into the process only at deterministic boundaries (the tick)."
        notes: "Explain that because DST forces a single-threaded state machine, blocking is fatal. We must use event-driven I/O to handle concurrency without threads and decouple progress from the OS."

      - type: "text"
        title: "Why TickCompletableFuture Over CompletableFuture?"
        bullets:
          - "CompletableFuture defaults to multi-threading (ForkJoinPool.commonPool), breaking determinism."
          - "TickCompletableFuture strictly executes callbacks within the single-threaded tick loop."
        notes: "Explain that standard Java futures introduce non-determinism via thread pools. Tickloom uses a custom TickCompletableFuture to ensure that all asynchronous continuations and state transitions happen predictably on the main deterministic event loop without data races."

      - type: "diagram"
        title: "TickCompletableFuture Key Methods"
        diagramRef: "listenable_future_methods"
        bullets:
          - "Provides standard asynchronous ergonomics."
          - "Guarantees callbacks run sequentially within the tick loop."
        notes: "Walk through the key methods of TickCompletableFuture. Emphasize that these methods provide standard asynchronous ergonomics while ensuring all callbacks run sequentially within the tick loop without spawning background threads."

      - type: "diagram"
        title: "TickCompletableFuture Execution Flow"
        diagramRef: "tick_future_network_sequence"
        bullets:
          - "The process initiates work and yields control."
          - "Network delivery occurs independently of the process."
          - "Callbacks execute synchronously upon completion by the driver tick."
        notes: "Step through the sequence. Point out that the Driver ticks the Process, the Process returns the Future, and yields. Ticks advance independently. Finally, the Driver ticks the Network which delivers the response and completes the future on the main thread."

      - type: "text"
        title: "Determinism Does Not Mean One Core"
        bullets:
          - "Core state changes stay single-threaded."
          - "I/O and background work can still run concurrently."
          - "Horizontal scaling comes from adding more processes and shards."
        notes: "Use this slide to answer the natural multicore question before the demo. The key idea is that deterministic execution applies to authoritative state mutation inside one execution domain, not to the whole machine. Concurrency can still exist around the state machine, and more cores are used by running more deterministic processes or shards."

      - type: "text"
        title: "Tickloom Demo"
        bullets:
            - https://github.com/unmeshjoshi/tickloom
        notes: "Show the Tickloom demo here."

  - title: "Fast Forward Execution"
    slides:
      - type: "text"
        title: "Time Is Abstracted Into Ticks"
        bullets:
          - "Protocol logic does not depend on physical time"
          - "Heartbeats, timeouts, retries, message delays, and disk delays are ticks"
          - "The state machine reasons in logical steps, not wall-clock seconds"
        notes: "Open this section by separating protocol time from physical time. The important idea is that time-based behavior is expressed in logical ticks. Physical time is an external pacing decision, not something the protocol logic depends on directly."

      - type: "text"
        title: "Ticks Are Just Counters"
        bullets:
          - "A heartbeat interval can be configured as 10 ticks"
          - "A request timeout can be configured as 100 ticks"
          - "Those are counts of how many times tick() is invoked"
        notes: "Make this concrete. A tick is not magic. It is an integer counter advancing inside a component. The component asks: have enough ticks elapsed for this timeout, retry, heartbeat, or delay to fire?"

      - type: "text"
        title: "Production Maps Ticks To The Wall Clock"
        bullets:
          - "Production chooses a scaling factor, such as tick_ms = 10 ms"
          - "10 ticks become 100 ms for a heartbeat"
          - "100 ticks become 1 full second for a timeout"
        notes: "Explain the production mapping. If the driver, event loop, or timer pacing causes tick() to be invoked every 10 milliseconds, then logical tick counts become physical durations. This is necessary for real deployments, where clients and networks live in wall-clock time."

      - type: "text"
        title: "Physical Clusters Are Bound By Physics"
        bullets:
          - "A live cluster must obey the wall-clock duration behind each tick"
          - "A 100-tick timeout paced at 10 ms per tick really takes 1 second"
          - "The cluster must live through the time it is testing"
        notes: "This is the pivot. In a real cluster, time cannot be skipped. If we want the timeout to fire, physical time has to pass. If we delay a message by 200 milliseconds, the message actually waits."

      - type: "text"
        title: "Chaos Testing Is Bottlenecked By Waiting"
        bullets:
          - "Fault injection in a running cluster still pays wall-clock cost"
          - "To force a 1-second timeout, the test waits 1 real second"
          - "Every delayed message, retry, and recovery interval adds elapsed time"
        notes: "Connect this to Jepsen-style testing without diminishing Jepsen. Jepsen is powerful because it tests a real system, but a real system has to pay real time. Every timeout scenario consumes physical time before the interesting behavior even appears."

      - type: "text"
        title: "Exhaustive Fault Testing Takes Years"
        bullets:
          - "Fault testing explores permutations of delays, crashes, recoveries, and requests"
          - "Tens of thousands of schedules can already mean days of cluster runtime"
          - "Millions of combinations push physical testing into years"
        notes: "Use simple arithmetic here. If one schedule needs 10 seconds of behavior, 50,000 schedules take almost six days on a real cluster. If each schedule needs a minute, it is about 35 days. If each needs an hour, it is about 5.7 years."

      - type: "text"
        title: "DST Eliminates Physical Time"
        bullets:
          - "The state machine still waits for elapsed ticks"
          - "But there is no sleep between tick() invocations"
          - "A 100-tick timeout is just 100 loop iterations in the driver"
        notes: "This is the payoff. The protocol logic has not changed. The timeout is still 100 ticks. But in simulation, the driver can call tick() in a tight loop. Time is advanced by computation rather than by waiting for the wall clock."

      - type: "text"
        title: "Speeding Up Time"
        bullets:
          - "DST fast-forwards through time-dependent executions"
          - "Rare combinations of delays, failures, retries, and timeouts appear sooner"
          - "Scenarios that take years physically can execute in minutes in simulation"
        notes: "Land the section with the main message. DST is not only deterministic replay after a bug is found. It is deterministic fast-forward before the bug is found. The acceleration is time-to-bug compression, not database throughput."

  - title: "Q&A"
    slides:
      - type: "text"
        title: "Questions?"
        bullets:
            - Questions
        notes: "Q/A slide"

  - title: "Appendix"
    slides:
      - type: "diagram"
        title: "Timeouts Advance On Ticks"
        diagramRef: "tick_based_timeout"
        bullets:
          - "A timeout fires only after enough explicit ticks have advanced it."
        notes: "Use this appendix slide if someone asks how a timeout becomes deterministic. The answer is that it is not tied to wall-clock time; it advances only when the process is ticked."

      - type: "diagram"
        title: "RequestWaitingList Uses Tick-Based Timeouts"
        diagramRef: "request_waiting_list_timeout"
        bullets:
          - "The waiting list tracks in-flight requests use tick based timeout."
        notes: "Use this appendix slide to explain how request timeouts are implemented in practice. The process registers the request, the waiting list advances on process ticks, and either a response completes the request or the timeout path fires."
