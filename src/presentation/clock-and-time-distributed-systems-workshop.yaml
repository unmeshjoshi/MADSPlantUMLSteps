title: "Consistency and Time: Patterns in Distributed Databases - Workshop Edition"
description: "Extended workshop-oriented version of the clock and time deck. Connects physical clock drift, HLC, clock uncertainty, read restart, and serializable validation to the hands-on distrib-txn-db repository."
icon: "fas fa-clock"
category: "Distributed Systems"
sections:
  - title: "Consistency and Time: Patterns in Distributed Databases"
    slides:
      - type: "text"
        title: "Agenda"
        bullets:
          - "Why transaction consistency is hard in distributed systems"
          - "How HLC, clock uncertainty handling, and external consistency fit together"
          - "How those ideas show up in the distrib-txn-db workshop"
          - "What to implement, what to observe, and what each module adds"
        notes: "This version of the talk is both conceptual and hands-on. Keep reminding the audience that every major idea maps to a concrete module or test in distrib-txn-db."

  - title: "Distribution and the need for transaction"
    slides:
      - type: "diagram"
        title: "A Database Cluster"
        diagramRef: "distributed_db_topology_cluster"
        bullets:
          - "To handle massive load, modern databases span multiple nodes."
          - "The cluster appears as a single logical database to the client."
        notes: "Start simple: we have a cluster. To scale beyond a single machine, we add more machines."

      - type: "diagram"
        title: "Sharding / Partitioning Data"
        diagramRef: "distributed_db_topology_partitions"
        bullets:
          - "Data is split into partitions (shards)."
          - "Each node is responsible for a different subset of keys."
          - "This allows horizontal scaling of storage and write throughput."
        notes: "Explain that node 1 doesn't have everything. We partition the data. Keys A-H live here, I-Q live there."

      - type: "diagram"
        title: "Replication for High Availability"
        diagramRef: "distributed_db_topology_replication"
        bullets:
          - "Each partition is replicated across multiple nodes using consensus (like Raft)."
          - "One node acts as the Leader for a partition, others are Followers."
          - "If a node crashes, the Followers elect a new Leader."
        notes: "Now introduce High Availability. Every node is a leader for some data, and a follower for other data. This is how Spanner, Cockroach, and Yugabyte work."

      - type: "diagram"
        title: "The Problem: Cross-Partition Writes"
        diagramRef: "distributed_db_transaction_problem"
        bullets:
          - "What happens when a single logical transaction touches multiple partitions?"
          - "If Alice tries to manage atomicity from the client, partial failures are catastrophic."
          - "The system is left in an inconsistent state."
        notes: "This is the core motivation for this entire workshop. If independent writes fail halfway, atomicity is broken. We need a Distributed Transaction Protocol."

      - type: "text"
        title: "Real-World Distributed Transactions"
        bullets:
          - "Kafka (KIP-98): Atomic 'consume-transform-produce' executed in its entirety across multiple topics and partitions."
          - "Spanner, CockroachDB, YugabyteDB: Distributed Two-Phase Commit (2PC) for cross-partition, multi-row writes."
          - "MongoDB: Multi-document distributed transactions across replica sets."
        notes: "Every modern distributed data system needs a protocol (usually a variant of 2PC) to guarantee atomicity when a single logical operation touches multiple independent partitions."

  - title: "Transaction Isolation"
    slides:
      - type: "text"
        title: "What is Transaction Isolation?"
        bullets:
          - "Atomicity handles partial failures, but isolation handles concurrent transactions."
          - "Without isolation, concurrent operations could see partial updates or overwrite each other."
          - "Databases offer different isolation levels, balancing strict correctness against concurrency and performance."
        notes: "Define isolation. It defines how and when the changes made by one transaction become visible to others."

      - type: "diagram"
        title: "Snapshot Isolation"
        diagramRef: "snapshot_isolation"
        bullets:
          - "A popular isolation level where each transaction reads from a consistent snapshot of the database at a specific timestamp."
          - "Readers do not block writers, and writers do not block readers."
          - "Provides strong consistency for most applications, avoiding dirty reads and non-repeatable reads."
        notes: "This introduces the idea of reading at a specific timestamp, which requires Multi-Version Concurrency Control (MVCC) and is central to the workshop."

      - type: "text"
        title: "Snapshot Isolation Guarantees"
        bullets:
          - "Consistent Snapshot: Reads see the database exactly as it looked when the transaction started."
          - "Read-Your-Own-Writes: A transaction can see its own uncommitted updates."
          - "First-Committer-Wins: If two transactions update the same key, the first to commit wins."
          - "Lock-Free Reads: Readers never block writers, and writers never block readers."
          - "Write Skew: Protects against most anomalies, but still vulnerable to 'Write Skew'."
        notes: "This slide sets the stage for the workshop. We build MVCC to get snapshots, and later add a Serializable layer (Module 06) specifically to fix Write Skew."

      - type: "text"
        title: "The Need for Ordered Versions"
        bullets:
          - "To provide Snapshot Isolation, the database cannot simply overwrite old data in place."
          - "Every write must be saved as a new version (Multi-Version Concurrency Control)."
          - "We need to definitively know the order of writes: which write happened before which?"
          - "Snapshot Isolation specifically requires Causal Monotonicity: if operation A triggers operation B, B's version must be higher."
        notes: "Explain that MVCC requires versions, and those versions must have a strict causal order to build a coherent point-in-time snapshot."

      - type: "text"
        title: "Sourcing Monotonic Versions"
        bullets:
          - "Single-node DBs (like Postgres): Use a simple logical counter (Transaction ID)."
          - "Centralized Architecture: Use a single 'Timestamp Oracle' node to hand out versions (bottleneck risk)."
          - "Physical Time (Google Spanner): Uses TrueTime (atomic clocks/GPS) for strict global monotonicity."
          - "Decentralized Logical Time: We build Hybrid Logical Clocks (HLC) to provide causal monotonicity."
        notes: "This is the bridge to the next major section about clocks. Single nodes are easy, distributed systems require a strategy. The rest of the workshop builds on the decentralized HLC strategy."

      - type: "text"
        title: "Using Timestamp as Version"
        bullets:
          - "User-Meaningful: Timestamps allow for 'Time Travel' or 'AS OF' queries using human-understandable time rather than arbitrary transaction IDs."
          - "Decentralized Generation: Unlike a global logical counter, physical time can be read locally on any node without network coordination."
          - "Natural Expiration: It makes garbage collection simple (e.g., 'delete all versions older than 7 days')."
          - "External Correlation: Makes it easy to map application events (like a user action) directly to a database state."
        notes: "Timestamps bridge the gap between the database's internal need for ordering and the user's external expectation of time."


  - title: "The Problem: Physical Clock Drift"
    slides:
      - type: "text"
        title: "The Fundamental Issue: Independent, Drifting Clocks"
        bullets:
          - "Computers run on independent clocks that drift apart"
          - "No global time source: each node has its own view of time"
          - "Clock skew (epsilon): the uncertainty window between different machines"
          - "This is a hardware reality, not an application bug"
        notes: "Set up the rest of the talk. Everything that follows is a response to this one fact."

      - type: "diagram"
        title: "Clock Skew Problem: Different Readings"
        diagramRef: "clock_skew_issue"
        bullets:
          - "Alice reads from Amber with a lagging clock and sees an older value"
          - "Bob reads from Blue with a later clock and sees a newer value"
          - "The same logical key appears to have different latest values"
          - "This violates the real-time intuition users expect"
        notes: "This is the motivating anomaly for the whole deck."

      - type: "text"
        title: "Why Physical Clocks Fail"
        bullets:
          - "NTP narrows skew but does not remove it"
          - "Wall clocks can move backward, which breaks monotonic timestamp assignment"
          - "Different servers cannot safely compare wall-clock timestamps as if they came from one clock"
          - "So we need logical rules on top of physical time"
        notes: "Make the audience distrust raw wall clocks before introducing Lamport and HLC."

  - title: "Logical Foundation: Lamport Clock"
    slides:
      - type: "text"
        title: "Lamport Clock: Ensuring Causality"
        bullets:
          - "Lamport clocks preserve happens-before relationships"
          - "When a node receives a message, it takes the maximum of local and remote logical time"
          - "The result is a causally meaningful order across message exchanges"
          - "But the order is still detached from real wall-clock time"
        notes: "Lamport solves causality, not real-time ordering."

      - type: "diagram"
        title: "Lamport Clock: Causal Ordering"
        diagramRef: "lamport_clock_sequence"
        bullets:
          - "Each request carries a logical timestamp"
          - "Each receiver updates its local logical clock using the received value"
          - "Later responses propagate that newer logical time back to the client"
          - "Causally related events get a stable order"
        notes: "Useful precursor to HLC propagation in the workshop."

      - type: "diagram"
        title: "Lamport Clock: Partial Order Limitation"
        diagramRef: "lamport_clock_partial_order"
        bullets:
          - "Concurrent events on different servers are still only partially ordered"
          - "Lamport clocks cannot say which concurrent event was earlier in real time"
          - "That makes snapshot reads awkward when users care about real-time ordering"
          - "We need timestamps that stay close to physical time without losing causality"
        notes: "This sets up the reason for HLC."

      - type: "text"
        title: "Lamport Clock Limitations"
        bullets:
          - "Partial order only"
          - "No direct relation to wall time"
          - "Good for causality, weak for user-facing time semantics"
          - "Next step: combine wall-clock time and logical ticks"
        notes: "Transition cleanly into HLC."

  - title: "Hybrid Solution: Hybrid Logical Clock (HLC)"
    slides:
      - type: "text"
        title: "Hybrid Logical Clock: Best of Both Worlds"
        bullets:
          - "HLC combines wall-clock time with a logical counter"
          - "HybridTimestamp = (wallClockTime, logicalTicks)"
          - "It stays close to physical time but still respects message causality"
          - "It is monotonic even when raw wall-clock behavior is awkward"
        notes: "This is the key timestamp primitive used throughout the workshop."

      - type: "diagram"
        title: "Hybrid Logical Clock (HLC): Basic Usage"
        diagramRef: "hybrid_clock_basic"
        bullets:
          - "On each local event, compare local physical time, local HLC, and received HLC"
          - "Advance wall time if possible"
          - "Otherwise keep wall time and increment logical ticks"
          - "This creates a timestamp that is both causal and close to real time"
        notes: "Explain the rule slowly. This is foundational."

      - type: "text"
        title: "Exercise: Hybrid Logical Clock (HLC)"
        bullets:
          - "Implement HybridClock.now()"
        notes: "Tie the abstract HLC rule directly to the first exercise in the workshop."
  
  - title: "Versioned Storage"
    slides:
      - type: "text"
        title: "Modules 02 and 03: Where HLC Becomes Storage"
        bullets:
          - "Module 02 stores multiple committed versions under MVCC keys"
          - "Reads ask: what version was visible at timestamp T?"
          - "Module 03 routes keys to storage nodes using hash(key)"
          - "Clients and replicas propagate HLC timestamps on every request and response"
        notes: "This is the bridge from time to versioned distributed storage."

      - type: "diagram"
        title: "MVCC Version Chains: The Logical Model"
        diagramRef: "workshop_mvcc_logical_version_ordering"
        bullets:
          - "A single logical key has many committed versions over time"
          - "The visibility rule is: return the latest version whose timestamp is <= read timestamp"
          - "readAt(MAX_TIMESTAMP) returns the latest value"
          - "readAt(T) returns the historical snapshot visible at time T"
        notes: "Start with the simple logical model from the storage notes before dropping to byte encodings. One key, multiple versions, latest visible version wins."

      - type: "text"
        title: "RocksDB Forces Us To Think In Bytes"
        bullets:
          - "The logical MVCC rule is simple, but RocksDB only stores byte-array keys and values"
          - "Comparison is lexicographic, essentially memcmp-style unsigned byte ordering"
          - "So the physical key format must preserve the access pattern we want"
          - "That is why the workshop's codec is a core part of the storage design, not just a serialization detail"
        notes: "This is the conceptual bridge from the PDF page into OrderPreservingCodec. The storage engine sees bytes, not logical tuples."

      - type: "diagram"
        title: "Physical MVCC Key Layout In RocksDB"
        diagramRef: "workshop_mvcc_physical_key_encoding"
        bullets:
          - "Workshop format: [LogicalKeyBytes] + [0x00] + [InvertedWallClock] + [InvertedTicks]"
          - "The 0x00 separator creates a hard boundary between the user key and timestamp suffix"
          - "Timestamp bytes are inverted so newer versions sort before older ones"
          - "That means an ascending RocksDB iterator sees the newest version of one logical key first"
        notes: "Connect this slide directly to OrderPreservingCodec.encodeMVCCKey. The separator is crucial, especially when keys share prefixes like User and User1."

      - type: "diagram"
        title: "How Prefix Seek And As-Of Reads Exploit The Encoding"
        diagramRef: "workshop_mvcc_rocksdb_seek_behavior"
        bullets:
          - "All versions of one logical key stay contiguous in byte order"
          - "Seeking to the logical key prefix lands on the newest version first"
          - "Seeking with an as-of timestamp lands on the newest version visible at that time"
          - "This lets RocksDB-backed MVCC implement the same visibility rule as the in-memory model efficiently"
        notes: "This is the payoff. The encoding is not arbitrary; it exists so prefix scans and as-of reads become simple iterator operations."

      - type: "diagram"
        title: "Anatomy of a Table: The JSON Blob Anti-Pattern"
        diagramRef: "workshop_mvcc_table_option1_blob"
        bullets:
          - "Option 1 serializes the entire row into a single value (e.g., JSON blob) under one RowKey."
          - "Every single-column update forces a new version of the entire row."
          - "This causes massive data duplication and storage bloat in an MVCC system."
        notes: "We didn't choose this option. It's too expensive for partial updates."

      - type: "diagram"
        title: "Why Per-Column Keys Win in MVCC"
        diagramRef: "workshop_mvcc_table_option2_wide"
        bullets:
          - "Option 2 (Wide-Column) stores each column separately with a common key prefix."
          - "Efficient Partial Updates: Only the changed field gets a new version."
          - "Row Reconstruction: getRow() runs a prefix scan to dynamically gather the latest visible columns."
          - "Production systems like YugabyteDB use this exact pattern (DocKey)."
        notes: "Connect this back to the workshop code. This is exactly how Table.java works."


      - type: "diagram"
        title: "How Hybrid Timestamps Flow Through The Workshop"
        diagramRef: "workshop_hlc_routing_flow"
        bullets:
          - "BeginTransaction goes to coordinatorFor(txnId)"
          - "TxnWrite goes to replicaFor(key)"
          - "Each RPC carries clientTime or propagatedTime"
          - "Both clients and replicas merge received HLC values into their local clock"
          - "The system stays decentralized because time moves through normal request/response traffic"
        notes: "This slide makes the workshop architecture concrete."

      - type: "text"
        title: "Modules 02 and 03: Where HLC Becomes Storage"
        bullets:
          - "Module 02 stores multiple committed versions under MVCC keys"
          - "Reads ask: what version was visible at timestamp T?"
          - "Module 03 routes keys to storage nodes using hash(key)"
          - "Clients and replicas propagate HLC timestamps on every request and response"
        notes: "This is the bridge from time to versioned distributed storage."

