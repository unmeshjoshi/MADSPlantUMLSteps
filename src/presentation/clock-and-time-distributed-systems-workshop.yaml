  - title: "Distributed Transactions In The Workshop"
    slides:
      - type: "text"
        title: "Module 04: Snapshot Isolation On Top Of HLC + MVCC"
        bullets:
          - "The workshop does not jump straight to commit wait or TrueTime"
          - "It first builds a decentralized snapshot-isolation engine"
          - "Transactions get a read timestamp at begin time"
          - "Writes become intents first, then commit resolves them into committed MVCC versions"
        notes: "This section explains what the audience is actually building in module 04."

      - type: "diagram"
        title: "Transaction Lifecycle In distrib-txn-db"
        diagramRef: "workshop_transaction_lifecycle"
        bullets:
          - "BeginTransaction creates a PENDING TxnRecord on the coordinator"
          - "TxnWrite stores an IntentRecord in the participant's intentStore"
          - "TxnRead returns own intents first, otherwise reads committed data at readTimestamp"
          - "Commit marks the record COMMITTED and sends resolve requests to participants"
          - "Participants move intents into the committed store and delete provisional records"
        notes: "This is the operational core of the workshop."

      - type: "text"
        title: "Module 04 Concepts To Emphasize"
        bullets:
          - "coordinatorFor(txnId): transaction records live on a node chosen by hashing txnId"
          - "replicaFor(key): key-level reads and writes route by hash(key)"
          - "intentStore and committedStore are separate"
          - "read-your-own-writes is preserved even though writes are still provisional"
          - "lazy intent resolution lets later reads and writes clean up old intents"
        notes: "These are the ideas people should look for in TransactionalStorageClient and TransactionalStorageReplica."

      - type: "diagram"
        title: "Snapshot Isolation with HLC: Complete Transaction Flow"
        diagramRef: "snapshot_isolation_hybrid_clock_detailed"
        showBullets: false
        bullets:
          - "BEGIN establishes transaction context and read timestamp"
          - "READ sees one stable snapshot"
          - "WRITE creates intents that are invisible to other transactions"
          - "COMMIT converts intents to committed versions"
          - "MVCC plus HLC gives decentralized snapshot isolation"
        notes: "Reuse the existing detailed diagram here because it already matches the workshop story well."

  - title: "The Remaining Gap: External Consistency"
    slides:
      - type: "text"
        title: "The External Consistency Problem"
        bullets:
          - "HLC-based snapshot isolation is still vulnerable to clock-skew ambiguity"
          - "A transaction can start after another transaction commits in real time"
          - "But the later transaction may still read from an older snapshot timestamp"
          - "That means a causally later client operation can miss a value that already committed"
        notes: "This is the central gap between decentralized SI and externally consistent reads."

      - type: "text"
        title: "External Consistency Violation Example"
        bullets:
          - "Writer commits around wall-clock 1005 on one node"
          - "Reader begins with read timestamp 1000 on another node"
          - "The writer's value is newer than the reader snapshot"
          - "Yet the real-time order says the read came later"
          - "That is the uncertainty window problem in practical form"
        notes: "Phrase this in module/test terms rather than only abstract database terms."

      - type: "text"
        title: "Module 04 Demonstrates The Problem On Purpose"
        bullets:
          - "ClockUncertaintySnapshotTest shows that a committed value can be missed inside the uncertainty window"
          - "The reader at timestamp 1000 does not see a value committed at 1005"
          - "A later read at a sufficiently advanced timestamp does see it"
          - "This is not a bug in MVCC; it is the expected consequence of skewed clocks"
        notes: "Use the module 04 test as the concrete proof point."

  - title: "Clock-Bound Wait And Read Restart"
    slides:
      - type: "text"
        title: "Two Families Of Solutions"
        bullets:
          - "Commit wait: delay acknowledgment until the uncertainty window has passed"
          - "Read restart: let writes commit, but restart unlucky reads that fall inside the uncertainty window"
          - "Both approaches protect real-time ordering"
          - "The workshop implements the read-restart family"
        notes: "This is the framing slide for comparing Spanner-style and Cockroach/Yugabyte-style behavior."

      - type: "diagram"
        title: "Commit Wait: Write Waits for Clock Offset"
        diagramRef: "commit_wait_clock_skew"
        bullets:
          - "The write picks a timestamp and then waits before becoming visible"
          - "The wait is long enough that every other node's clock should have advanced beyond that point"
          - "After the wait, future reads are safe"
          - "This is the intuition behind the clock-bound wait pattern"
        notes: "Keep this as the conceptual commit-wait reference point."

      - type: "diagram"
        title: "What TrueTime Gives: Clock Bounds Across Cluster Nodes"
        diagramRef: "clock_bound"
        bullets:
          - "Each node has a bounded uncertainty interval"
          - "The database reasons about earliest and latest possible real time"
          - "That bounded uncertainty turns external consistency into a wait problem"
          - "Smaller bounds mean shorter waits"
        notes: "This ties into Spanner and AWS ClockBound later."

      - type: "diagram"
        title: "Read Restart In Module 05"
        diagramRef: "workshop_read_restart_flow"
        bullets:
          - "Module 04 would simply miss the newer value"
          - "Module 05 looks ahead through readTs + uncertaintyOffset"
          - "If it finds a newer committed version inside that window, it returns Read restart required"
          - "The client restarts at a later propagated timestamp and retries safely"
        notes: "This is the most important workshop-specific timing diagram in the whole deck."

      - type: "diagram"
        title: "Read Restart: Handling Uncertainty Window While Reading"
        diagramRef: "read_restart_clock_skew"
        bullets:
          - "A read lands on a lagging timestamp"
          - "The server detects that a newer value may exist in the uncertainty window"
          - "The read restarts at a safer timestamp"
          - "The second read sees the committed value"
        notes: "Reuse the existing teaching diagram after the workshop-specific flow."

      - type: "text"
        title: "How Module 05 Implements Read Restart"
        bullets:
          - "ClockUncertaintyTransactionalStorageReplica extends the transactional replica from module 04"
          - "It computes uncertaintyLimit = readTimestamp + uncertaintyOffset"
          - "It searches for the latest committed version up to that limit"
          - "If that latest version is newer than readTimestamp, it returns an error instead of a stale read"
          - "That keeps writes fast and pushes the correction to the unlucky read path"
        notes: "This slide should point people toward the exact logic in module 05 without overwhelming them with code."

      - type: "text"
        title: "Commit Wait vs Read Restart"
        bullets:
          - "Commit wait increases write latency to simplify later reads"
          - "Read restart keeps the write path fast but occasionally retries reads"
          - "Spanner famously leans on commit wait with tight time bounds"
          - "CockroachDB and YugabyteDB are better known for read-restart style behavior on commodity infrastructure"
          - "The workshop uses read restart because it is easier to teach on top of HLC + MVCC"
        notes: "Good comparison slide before the real-world systems section."

  - title: "The Enabler: Time Sync And Bounded Uncertainty"
    slides:
      - type: "text"
        title: "Spanner: TrueTime With Dedicated Hardware"
        bullets:
          - "Spanner uses TrueTime to expose bounded uncertainty intervals"
          - "That makes commit wait practical because epsilon is small"
          - "The write waits for certainty before the client is acknowledged"
          - "The result is externally consistent reads and writes at global scale"
        notes: "Keep this high level and tie it back to the earlier commit-wait diagrams."

      - type: "text"
        title: "Open Source Databases: Software-Only Trade-Offs"
        bullets:
          - "Commodity infrastructure usually has larger uncertainty bounds"
          - "That makes pure commit wait more expensive"
          - "So many systems prefer HLC plus read restart"
          - "The workshop follows that path because it matches what people can build and test locally"
        notes: "Relate the design choice directly to the workshop."

      - type: "text"
        title: "Amazon Time Sync And ClockBound"
        bullets:
          - "AWS exposes bounded clock-error information through its time-sync tooling"
          - "That brings a TrueTime-like model closer to commodity cloud infrastructure"
          - "With bounded uncertainty, a database can implement commit-wait style external consistency"
          - "But the protocol still has to be built in the database layer"
        notes: "Useful modern context after the conceptual treatment."

  - title: "Beyond Clock Uncertainty: Serializable Validation"
    slides:
      - type: "text"
        title: "A Safe Snapshot Is Still Not Serializable"
        bullets:
          - "Read restart fixes uncertainty about what snapshot a transaction should see"
          - "It does not stop two transactions from reading related rows and writing different keys"
          - "That is the classic write-skew gap of snapshot isolation"
          - "So module 06 tackles a different problem from module 05"
        notes: "Very important distinction. Do not let people confuse uncertainty with write skew."

      - type: "diagram"
        title: "Serializable Layer Prevents Write Skew"
        diagramRef: "workshop_serializable_write_skew_flow"
        bullets:
          - "Two snapshot transactions read the same invariant"
          - "Under plain SI both might write different keys and both commit"
          - "Module 06 records provisional reads and checks them on conflicting writes"
          - "One transaction is rejected before both can violate the invariant"
        notes: "This is the clearest way to show why module 06 exists."

      - type: "text"
        title: "What Module 06 Adds"
        bullets:
          - "A readProvisionalStore tracks what keys pending transactions have read"
          - "A later writer checks for conflicting pending serializable reads"
          - "Tie-break logic prevents both transactions from proceeding"
          - "This converts the workshop from snapshot isolation into a simplified serializable layer"
        notes: "Point people to SerializableTransactionalStorageReplica and SerializableWriteSkewTest."

  - title: "Suggested Hands-On Flow"
    slides:
      - type: "text"
        title: "Suggested Lab Sequence"
        bullets:
